<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHE · SCIH — Brigadas Hospitalarias</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030609;--s1:#080f1e;--card:#0b1625;--bord:#122035;
  --text:#cce0ff;--dim:#5a7898;--muted:#2d4560;
  --blue:#2d8af0;--amber:#f5c400;--red:#e83030;--grn:#17a850;
  --teal:#06b6d4;--purple:#8b5cf6;--orange:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;color:var(--text)}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(3,6,9,.97);border-bottom:1px solid #0d1e32;display:flex;align-items:center;padding:0 20px;gap:12px;z-index:90}
.hlogo{width:30px;height:30px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.htit{font-family:'JetBrains Mono',monospace;font-size:11px;color:#2d4560;letter-spacing:2px}
.hsep{width:1px;height:20px;background:#0d1e32}
.hst{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--blue)}
.hr{margin-left:auto;display:flex;align-items:center;gap:10px}
.tbox{display:flex;align-items:center;gap:8px;background:#080f1e;border:1px solid #0d1e32;border-radius:6px;padding:4px 12px}
.tlbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:#2d4560;letter-spacing:1px}
.tval{font-family:'JetBrains Mono',monospace;font-size:17px;color:var(--amber);letter-spacing:3px;min-width:56px}
.tval.warn{color:var(--red);animation:blink .5s steps(1) infinite}
@keyframes blink{50%{opacity:.15}}
.hsl{font-family:'JetBrains Mono',monospace;font-size:11px;color:#2d4560}
.hbtn{padding:5px 12px;border:1px solid #0d1e32;border-radius:5px;background:none;color:#3a5570;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;transition:.15s}
.hbtn:hover{color:var(--text);border-color:#2d4560}

/* SBAR */
.sbar{position:fixed;top:48px;left:0;right:0;height:4px;background:#0a1520;z-index:89;display:flex;gap:1px}
.sb{flex:1;transition:background .3s}
.sb.a{background:var(--blue)}.sb.d{background:var(--blue);opacity:.35}
.sb.a.s2{background:var(--amber)}.sb.d.s2{background:var(--amber);opacity:.35}
.sb.a.s3{background:var(--red)}.sb.d.s3{background:var(--red);opacity:.35}

/* NAV */
.nav{position:fixed;top:50%;transform:translateY(-50%);width:42px;height:84px;background:rgba(3,6,9,.85);border:1px solid #0d1e32;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:88;color:#2d4560;font-size:28px;transition:.2s;user-select:none}
.nav:hover{background:rgba(45,138,240,.1);color:var(--text)}
.nav:disabled{opacity:.1;pointer-events:none}
.nprev{left:0;border-left:none;border-radius:0 10px 10px 0}
.nnext{right:0;border-right:none;border-radius:10px 0 0 10px}

/* SLIDES */
.slides-wrap{position:fixed;inset:52px 0 0}
.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:28px 52px;animation:fi .3s ease}
.slide.on{display:flex}
@keyframes fi{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}

/* ROLE SLIDES: no padding, full bleed */
.slide.role-slide{padding:0}

/* TYPE */
.tag{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tag::before{content:'';width:22px;height:2px;background:currentColor;border-radius:1px;display:inline-block}
.display{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,9vw,108px);line-height:.88;letter-spacing:2px;color:#fff}
.display b{color:var(--blue)}
.h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,6vw,70px);line-height:.9;letter-spacing:1.5px;color:#fff}
.body-lg{font-size:clamp(18px,1.9vw,22px);color:var(--dim);line-height:1.6}
.aline{width:48px;height:3px;border-radius:2px;margin:12px 0}

/* CARDS */
.card{background:#0b1625;border:1px solid #122035;border-radius:14px;padding:22px}
.bigcard{background:#0b1625;border:1px solid #122035;border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:12px}
.bigcard-ico{font-size:42px}
.bigcard-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,3vw,32px);letter-spacing:.5px;color:#fff}
.bigcard-text{font-size:clamp(16px,1.6vw,19px);color:var(--dim);line-height:1.55}

/* LAYOUTS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:26px;width:100%;max-width:1160px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;width:100%}
.col{display:flex;flex-direction:column;gap:12px}

/* PORTADA */
.agenda-card{background:#0b1625;border:1px solid #122035;border-radius:12px;padding:18px 22px;display:flex;gap:16px;align-items:flex-start;border-left:4px solid}
.anum{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;flex-shrink:0}
.atime{font-family:'JetBrains Mono',monospace;font-size:10px;color:#2d4560;letter-spacing:1px;margin-bottom:4px}
.aname{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.adesc{font-size:14px;color:var(--dim);line-height:1.4}
.bigbtn{display:inline-flex;align-items:center;gap:8px;padding:15px 34px;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;cursor:pointer;transition:.2s;color:#fff}
.bigbtn:hover{filter:brightness(1.12);transform:translateY(-1px)}

/* CHE */
.trig-item{display:flex;gap:14px;align-items:center;padding:15px 20px;background:#0b1625;border:1px solid #122035;border-radius:11px;border-left:4px solid var(--red)}
.trig-ico{font-size:28px;flex-shrink:0}
.trig-txt{font-size:clamp(17px,1.8vw,21px);color:var(--text);font-weight:600;line-height:1.3}
.vs-col{background:#0b1625;border:1px solid #122035;border-radius:14px;padding:24px}
.vs-item{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #0d1e32}
.vs-item:last-child{border-bottom:none}
.vs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:7px}
.vs-txt{font-size:clamp(16px,1.65vw,19px);color:var(--dim);line-height:1.45}

/* ORG */
.org-node{padding:11px 20px;border-radius:8px;text-align:center;font-weight:700;font-size:clamp(13px,1.4vw,16px);color:#fff;cursor:pointer;transition:.2s}
.org-node:hover{filter:brightness(1.2);transform:translateY(-1px)}
.org-lv{width:2px;height:22px;margin:0 auto;background:#0d1e32}
.org-lh{height:2px;background:#0d1e32;width:84%;margin:0 auto}

/* PRINCIPLES */
.prc{background:#0b1625;border:1px solid #122035;border-radius:13px;padding:20px;display:flex;flex-direction:column;gap:7px}
.prc-n{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;color:#0d1e32}
.prc-t{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,28px);letter-spacing:.5px;color:#fff;line-height:1}
.prc-txt{font-size:clamp(14px,1.5vw,17px);color:var(--dim);line-height:1.45}
.prc-ex{font-size:clamp(13px,1.3vw,15px);color:var(--blue);font-style:italic;border-left:2px solid var(--blue);padding-left:8px;margin-top:4px}

/* ── ROLES: FULL BLEED ── */
.role-wrap{position:absolute;inset:0;display:grid;grid-template-columns:52% 48%}
.role-visual{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.role-visual::after{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(0,0,0,.38) 0%,rgba(0,0,0,.08) 100%);pointer-events:none}
.role-content{background:#030609;display:flex;flex-direction:column;justify-content:center;padding:48px 58px;gap:20px;border-left:1px solid rgba(255,255,255,.05)}
.role-num{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:3px}
.role-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,6vw,72px);line-height:.9;letter-spacing:1px;color:#fff}
.role-tag{font-size:clamp(16px,1.7vw,20px);line-height:1.4;font-style:italic;opacity:.65}
.role-div{height:2px;width:48px;border-radius:1px}
.role-bullets{display:flex;flex-direction:column;gap:14px}
.role-bullet{display:flex;gap:14px;align-items:flex-start}
.rb-arr{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;flex-shrink:0;margin-top:1px}
.rb-txt{font-size:clamp(18px,2vw,23px);color:#deeeff;font-weight:700;line-height:1.2}
.role-rule{padding:14px 18px;border-radius:8px;border-left:3px solid;font-size:clamp(14px,1.5vw,17px);line-height:1.55;font-style:italic}

/* CASO */
.caso-wrap{width:100%;max-width:1180px;display:grid;grid-template-columns:1fr 300px;gap:20px}
.scen-box{border-radius:13px;padding:22px 26px;border:1px solid rgba(232,48,48,.32);background:rgba(232,48,48,.04)}
.scen-alert{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.adot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pd 1s infinite}
@keyframes pd{50%{transform:scale(.5);opacity:.35}}
.acode{font-family:'Bebas Neue',sans-serif;font-size:clamp(17px,2vw,23px);letter-spacing:2px;color:var(--red)}
.sit-q{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,3vw,36px);letter-spacing:.5px;color:#fff;line-height:1.15;margin-bottom:8px}
.sit-ctx{font-size:clamp(15px,1.6vw,18px);color:var(--dim);line-height:1.55}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.dopt{padding:14px 18px;border-radius:11px;background:rgba(255,255,255,.03);border:1.5px solid #122035;cursor:pointer;font-size:clamp(15px,1.65vw,19px);color:var(--text);text-align:left;transition:.2s;display:flex;gap:12px;align-items:center;width:100%;font-family:inherit;font-weight:700}
.dopt:hover:not([disabled]){border-color:#3a5570;background:rgba(255,255,255,.06);transform:translateY(-1px)}
.dopt[disabled]{cursor:default}
.dopt.ok{background:rgba(23,168,80,.11);border-color:rgba(23,168,80,.45);color:#6ee7a0}
.dopt.ng{background:rgba(232,48,48,.09);border-color:rgba(232,48,48,.38);color:#fca5a5}
.dletter{width:36px;height:36px;border-radius:7px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;flex-shrink:0}
.dfb{display:none;margin-top:14px;font-size:clamp(15px,1.65vw,18px);line-height:1.6;padding:14px 18px;border-radius:9px;border:1px solid}
.dfb.on{display:block;animation:fi .3s}
.dfb.ok{background:rgba(23,168,80,.07);border-color:rgba(23,168,80,.28);color:#6ee7a0}
.dfb.ng{background:rgba(232,48,48,.07);border-color:rgba(232,48,48,.22);color:#fca5a5}
.dnxt{display:none;margin-top:12px;padding:12px 28px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;transition:.2s}
.dnxt.on{display:inline-block;animation:fi .25s .15s both}
.dnxt:hover{background:#1a6dd0}
.score-panel{display:flex;flex-direction:column;gap:10px}
.score-box{background:#080f1e;border:1px solid #122035;border-radius:11px;padding:18px;text-align:center}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:68px;color:var(--amber);line-height:1}
.score-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#2d4560;letter-spacing:1.5px;margin-top:2px}
.ms-box{background:#080f1e;border:1px solid #122035;border-radius:11px;padding:14px}
.ms-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#2d4560;letter-spacing:1.5px;margin-bottom:10px}
.ms-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:3px;border:1px solid transparent;transition:.25s}
.ms-row.hi{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1)}
.ms-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ms-name{flex:1;font-size:12px;font-weight:600}
.ms-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--grn)}

/* CIERRE */
.recap-row{display:flex;gap:12px;align-items:flex-start;padding:13px 17px;background:#0b1625;border:1px solid #122035;border-radius:10px;margin-bottom:9px}
.rcheck{font-size:22px;flex-shrink:0}
.rtxt{font-size:clamp(16px,1.7vw,19px);color:var(--text);line-height:1.4}
.score-final{background:#080f1e;border:1px solid var(--amber);border-radius:16px;padding:30px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.sf-val{font-family:'Bebas Neue',sans-serif;font-size:88px;color:var(--amber);line-height:1}
.sf-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#2d4560;letter-spacing:2px}
.sf-grade{font-size:clamp(15px,1.6vw,18px);color:var(--dim);max-width:220px;line-height:1.45;text-align:center}
.rst-btn{padding:12px 28px;background:rgba(45,138,240,.1);color:var(--blue);border:1px solid var(--blue);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;cursor:pointer;transition:.2s;width:100%;margin-top:6px}
.rst-btn:hover{background:var(--blue);color:#fff}

/* POPUP */
.popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a1828;border:1px solid #122035;border-radius:16px;padding:26px;max-width:460px;width:90%;z-index:200;box-shadow:0 32px 90px rgba(0,0,0,.85);max-height:84vh;overflow-y:auto}
.overlay{display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.6);backdrop-filter:blur(5px)}

/* CONFETTI */
.cnf{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999}
@keyframes cf{to{transform:translateY(120vh) rotate(800deg);opacity:0}}
.kbd{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;color:#1a3050;letter-spacing:1px;z-index:70;display:flex;gap:14px}
.kk{background:#080f1e;border:1px solid #0d1e32;border-radius:4px;padding:2px 7px}
</style>
</head>
<body>
<div class="popup" id="popup"></div>
<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="hud">
  <div class="hlogo"><svg width="16" height="16" viewBox="0 0 16 16" fill="white"><rect x="6" y="1" width="4" height="14" rx="1.2"/><rect x="1" y="6" width="14" height="4" rx="1.2"/></svg></div>
  <div class="htit">CHE · SCIH</div>
  <div class="hsep"></div>
  <div class="hst" id="hst">BRIGADAS HOSPITALARIAS</div>
  <div class="hr">
    <div class="tbox"><div class="tlbl">TIEMPO</div><div class="tval" id="tmr">30:00</div></div>
    <button class="hbtn" id="tbtn" onclick="toggleTimer()">▶ INICIAR</button>
    <div class="hsl" id="hsl">0/20</div>
    <button class="hbtn" onclick="document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen()">⛶</button>
  </div>
</div>
<div class="sbar" id="sbar"></div>
<button class="nav nprev" id="bprev" onclick="go(cur-1)">‹</button>
<button class="nav nnext" id="bnext" onclick="go(cur+1)">›</button>
<div class="slides-wrap" id="sw"></div>
<div class="kbd"><span class="kk">← →</span> navegar <span class="kk">F</span> fullscreen <span class="kk">A B C D</span> responder</div>

{sit:'Una enfermera entra sin EPP al pasillo con humo para buscar a un paciente. ¿Quién actúa de inmediato sin pedir permiso?',ctx:'El humo aumenta. La enfermera ya está en el corredor. El riesgo es inmediato.',cor:'seg',opts:['seg','cmd','ops','enl'],why:'El <strong>Oficial de Seguridad</strong> es el único que puede detener una operación sin autorización previa cuando hay riesgo inmediato para el personal.'},

];

/* ════════════════════════════════
   SVG ART — 7 ROLE ILLUSTRATIONS
════════════════════════════════ */

  var bullHtml=r.bullets.map(function(b){
    return '<div class="role-bullet">'+
      '<span class="rb-arr" style="color:'+r.color+'">→</span>'+
      '<span class="rb-txt">'+b+'</span>'+
      '</div>';
  }).join('');
  return '<div class="slide role-slide" id="sl'+(6+idx)+'">'+
    '<div class="role-wrap">'+
    '<div class="role-visual" style="background:'+r.color+'">'+
    '<div style="position:absolute;inset:0;background:linear-gradient(145deg,rgba(0,0,0,.42) 0%,rgba(0,0,0,.05) 100%)"></div>'+
    art+
    '</div>'+
    '<div class="role-content">'+
    '<div class="role-num" style="color:'+r.color+'">ROL '+(idx+1)+' DE 7</div>'+
    '<div class="role-name" style="color:'+r.color+'">'+nameHtml+'</div>'+
    '<div class="role-tag" style="color:rgba(180,210,255,.6)">'+r.tag+'</div>'+
    '<div class="role-div" style="background:'+r.color+'"></div>'+
    '<div class="role-bullets">'+bullHtml+'</div>'+
    '<div class="role-rule" style="border-left-color:'+r.color+';background:'+r.color+'0c;color:'+r.color+'c0">'+r.rule+'</div>'+
    '</div>'+
    '</div></div>';
}

/* ════════════════════════════════
   DECISION SLIDES
════════════════════════════════ */
function mkDecSlide(d){
  var dec=DECS[d];var sid=14+d;
  var L=['A','B','C','D'];
  var opts=dec.opts.map(function(k,i){
    return '<button class="dopt" id="dopt'+d+'_'+k+'" onclick="answerDec('+d+',\''+k+'\')">'+
      '<span class="dletter">'+L[i]+'</span>'+
      '<span>'+RICONS[k]+' '+RNAMES[k]+'</span>'+
      '</button>';
  }).join('');
  var moRows=['cmd','seg','enl','ops','log','pla','fin'].map(function(k){
    var hi=k===dec.cor;
    return '<div class="ms-row'+(hi?' hi':'')+'" id="ms'+d+'_'+k+'">'+
      '<div class="ms-dot" style="background:'+RCOLORS[k]+(hi?'':'55')+'"></div>'+
      '<div class="ms-name" style="color:'+(hi?'#fff':'var(--muted)')+'">'+RICONS[k]+' '+RNAMES[k]+'</div>'+
      (hi?'<div class="ms-tag">ACTIVO</div>':'')+
      '</div>';
  }).join('');
  var nxtA=d<5?'go('+(sid+1)+')':'finishCase();go(20)';
  var nxtL=d<5?'Siguiente decisión ›':'Ver resultados ›';
  return sl(sid,'','',
    '<div class="caso-wrap">'+
    '<div class="col">'+
    '<div class="scen-box">'+
    '<div class="scen-alert"><div class="adot"></div><div class="acode">CÓDIGO ROJO · INCENDIO UCI · DECISIÓN '+(d+1)+'/6</div></div>'+
    '<div class="sit-q">'+dec.sit+'</div>'+
    '<div class="sit-ctx">'+dec.ctx+'</div>'+
    '</div>'+
    '<div class="card">'+
    '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:#2d4560;letter-spacing:1.5px;margin-bottom:12px">¿QUÉ ROL ACTÚA AQUÍ? · Teclas A B C D</div>'+
    '<div class="opts-grid" id="dopts'+d+'">'+opts+'</div>'+
    '<div class="dfb" id="dfb'+d+'"></div>'+
    '<button class="dnxt" id="dnxt'+d+'" onclick="'+nxtA+'">'+nxtL+'</button>'+
    '</div></div>'+
    '<div class="score-panel">'+
    '<div class="score-box">'+
    '<div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:#2d4560;letter-spacing:1px;margin-bottom:4px">PUNTOS DEL GRUPO</div>'+
    '<div class="score-big" id="ds'+d+'">0</div>'+
    '<div class="score-lbl">'+(d+1)+'/6 DECISIONES</div>'+
    '</div>'+
    '<div class="ms-box"><div class="ms-lbl">SCIH ACTIVO</div>'+moRows+'</div>'+
    '</div></div>');
}

/* ════════════════════════════════
   HTML HELPERS
════════════════════════════════ */
function sl(id,on,style,inner){return'<div class="slide'+(on?' on':'')+'" id="sl'+id+'"'+(style?' style="'+style+'"':'')+'>'+inner+'</div>';}
function agCard(n,c,t,name,desc){return'<div class="agenda-card" style="border-left-color:'+c+'"><div class="anum" style="color:'+c+'">'+n+'</div><div><div class="atime">'+t+'</div><div class="aname">'+name+'</div><div class="adesc">'+desc+'</div></div></div>';}
function bcard(ico,c,tit,txt){return'<div class="bigcard" style="border-top:3px solid '+c+'"><div class="bigcard-ico">'+ico+'</div><div class="bigcard-title">'+tit+'</div><div class="bigcard-text">'+txt+'</div></div>';}
function trig(ico,txt){return'<div class="trig-item"><div class="trig-ico">'+ico+'</div><div class="trig-txt">'+txt+'</div></div>';}
function vsI(c,t){return'<div class="vs-item"><div class="vs-dot" style="background:'+c+'"></div><div class="vs-txt">'+t+'</div></div>';}
function oNode(c,lbl,sub){return'<div class="org-node" style="background:'+c+'15;border:1px solid '+c+'45;color:'+c+'">'+lbl+(sub?'<div style="font-size:10px;opacity:.6;font-family:\'JetBrains Mono\',monospace;margin-top:2px">'+sub+'</div>':'')+'</div>';}
function arr(){return'<span style="font-size:22px;color:#2d4560">→</span>';}
function var_(c){return c;}
function prc(n,t,txt,ex){return'<div class="prc" style="border-top:3px solid var(--amber)"><div class="prc-n">'+n+'</div><div class="prc-t" style="color:var(--amber)">'+t+'</div><div class="prc-txt">'+txt+'</div><div class="prc-ex">'+ex+'</div></div>';}
function secC(key,c,ico,t,sub,roles){return'<div class="prc" style="background:'+c+'0d;border:1px solid '+c+'28;cursor:pointer" onclick="openPopup(\''+key+'\')">'+'<div style="font-size:26px">'+ico+'</div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;letter-spacing:.5px;color:'+c+';margin:4px 0">'+t+'</div><div style="font-size:12px;color:'+c+'77;margin-bottom:7px">'+sub+'</div>'+roles.map(function(r){return'<div style="font-size:12px;padding:3px 0;color:#3a5570;border-bottom:1px solid #0d1e32">'+r+'</div>';}).join('')+'</div>';}
function infoC(ico,tit,txt){return'<div class="card" style="padding:22px"><div style="font-size:32px;margin-bottom:8px">'+ico+'</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:#2d4560;letter-spacing:1.5px;margin-bottom:8px">'+tit+'</div><div style="font-size:clamp(16px,1.7vw,19px);color:var(--text);line-height:1.55">'+txt+'</div></div>';}

/* ════════════════════════════════
   POPUP
════════════════════════════════ */
function openPopup(key){
  var r=null;for(var i=0;i<ROLES.length;i++){if(ROLES[i].key===key){r=ROLES[i];break;}}
  if(!r)return;
  // also check role map
  var rdata={cmd:ROLES[0],seg:ROLES[1],enl:ROLES[2],ops:ROLES[3],log:ROLES[4],pla:ROLES[5],fin:ROLES[6]};
  r=rdata[key]||r;
  var bhtml=r.bullets.map(function(b){return'<div style="display:flex;gap:10px;margin-bottom:10px"><span style="color:'+r.color+'">›</span><span style="font-size:17px;color:#fff;font-weight:700">'+b+'</span></div>';}).join('');
  document.getElementById('popup').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'+
    '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+r.color+'">'+RNAMES[key]+'</div>'+
    '<button onclick="closePopup()" style="background:none;border:none;color:#2d4560;cursor:pointer;font-size:26px;line-height:1;padding:0">×</button>'+
    '</div>'+
    '<div style="font-size:15px;color:#5a7898;margin-bottom:16px;font-style:italic;line-height:1.5">'+r.tag+'</div>'+
    bhtml+
    '<div style="padding:12px 14px;background:'+r.color+'0e;border-radius:7px;border-left:3px solid '+r.color+';font-size:15px;color:'+r.color+'b8;line-height:1.55;font-style:italic;margin-top:4px">'+r.rule+'</div>';
  document.getElementById('popup').style.display='block';
  document.getElementById('overlay').style.display='block';
}
function closePopup(){document.getElementById('popup').style.display='none';document.getElementById('overlay').style.display='none';}

/* ════════════════════════════════
   NAV
════════════════════════════════ */
var stMap={0:'PORTADA',1:'E1 — ¿QUÉ ES EL CHE?',2:'E1 — ACTIVACIÓN',3:'E1 — ESTRUCTURA',4:'E2 — PRINCIPIOS SCIH',5:'E2 — ORGANIGRAMA',6:'E2 — COMANDANTE',7:'E2 — SEGURIDAD',8:'E2 — ENLACE',9:'E2 — OPERACIONES',10:'E2 — LOGÍSTICA',11:'E2 — PLANIFICACIÓN',12:'E2 — FINANZAS',13:'E3 — INTRODUCCIÓN',14:'E3 — DECISIÓN 1/6',15:'E3 — DECISIÓN 2/6',16:'E3 — DECISIÓN 3/6',17:'E3 — DECISIÓN 4/6',18:'E3 — DECISIÓN 5/6',19:'E3 — DECISIÓN 6/6',20:'CIERRE'};
var stC={0:null,1:'blue',2:'blue',3:'blue',4:'amber',5:'amber',6:'amber',7:'amber',8:'amber',9:'amber',10:'amber',11:'amber',12:'amber',13:'red',14:'red',15:'red',16:'red',17:'red',18:'red',19:'red',20:'grn'};

function go(n){
  if(n<0||n>=TOTAL)return;
  var p=document.getElementById('sl'+cur);if(p)p.classList.remove('on');
  cur=n;
  var nx=document.getElementById('sl'+cur);if(nx){nx.classList.remove('on');void nx.offsetWidth;nx.classList.add('on');}
  updateHUD();
}
function updateHUD(){
  var el=document.getElementById('hst');
  el.textContent=stMap[cur]||'';
  var c=stC[cur];
  el.style.color=c?'var(--'+c+')':'var(--blue)';
  document.getElementById('hsl').textContent=cur+'/'+(TOTAL-1);
  document.getElementById('bprev').disabled=cur===0;
  document.getElementById('bnext').disabled=cur>=TOTAL-1;
  buildSbar();
}
function buildSbar(){
  var sb=document.getElementById('sbar'),h='';
  for(var i=0;i<TOTAL;i++){
    var cls='sb';
    if(i>=13&&i<=19)cls+=' s3';
    else if(i>=4)cls+=' s2';
    if(i===cur)cls+=' a';else if(i<cur)cls+=' d';
    h+='<div class="'+cls+'"></div>';
  }
  sb.innerHTML=h;
}

/* ════════════════════════════════
   TIMER
════════════════════════════════ */
function startTimer(){if(timerOn)return;timerOn=true;document.getElementById('tbtn').textContent='⏸ PAUSAR';timerInt=setInterval(function(){if(secs<=0){clearInterval(timerInt);return;}secs--;var m=Math.floor(secs/60),sv=secs%60,el=document.getElementById('tmr');el.textContent=(m<10?'0':'')+m+':'+(sv<10?'0':'')+sv;el.className='tval'+(secs<=180?' warn':'');},1000);}
function toggleTimer(){if(timerOn){clearInterval(timerInt);timerOn=false;document.getElementById('tbtn').textContent='▶ REANUDAR';}else startTimer();}

/* ════════════════════════════════
   ANSWERS
════════════════════════════════ */
function answerDec(d,chosen){
  if(decDone[d])return;decDone[d]=true;
  var dec=DECS[d],isOk=chosen===dec.cor;
  dec.opts.forEach(function(k){var b=document.getElementById('dopt'+d+'_'+k);if(b){b.disabled=true;if(k===dec.cor)b.classList.add('ok');else if(k===chosen)b.classList.add('ng');}});
  var fb=document.getElementById('dfb'+d);
  fb.className='dfb on '+(isOk?'ok':'ng');
  fb.innerHTML=(isOk?'✓ Correcto. ':'✗ Incorrecto. ')+dec.why;
  if(isOk){caseScore+=10;confetti();}
  var sv=document.getElementById('ds'+d);if(sv)sv.textContent=caseScore;
  var nxt=document.getElementById('dnxt'+d);if(nxt)nxt.classList.add('on');
}
function finishCase(){
  var el=document.getElementById('sfval');if(el)el.textContent=caseScore;
  var g=document.getElementById('sfgrade');if(g){var p=Math.round(caseScore/60*100);g.textContent=p>=90?'¡Excelente! Dominan el SCIH.':p>=70?'Muy bien. Buena comprensión.':p>=50?'Buen inicio. Repaso recomendado.':'La práctica hace al maestro.';}
}
function resetAll(){caseScore=0;decDone={};secs=1800;timerOn=false;clearInterval(timerInt);var el=document.getElementById('tmr');if(el){el.textContent='30:00';el.className='tval';}document.getElementById('tbtn').textContent='▶ INICIAR';}

/* CONFETTI */
function confetti(){var c2=['#f5c400','#2d8af0','#17a850','#f97316','#06b6d4','#8b5cf6','#e83030'];for(var i=0;i<22;i++){(function(i){setTimeout(function(){var c=document.createElement('div');c.className='cnf';c.style.cssText='left:'+(15+Math.random()*70)+'%;top:20%;background:'+c2[i%7]+';animation:cf '+(0.7+Math.random()*0.8)+'s ease forwards;animation-delay:'+(Math.random()*0.3)+'s';document.body.appendChild(c);setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},2500);},i*25);})(i);}}

/* KEYBOARD */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1);}
  if(e.key==='f'||e.key==='F')document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
  if(e.key==='Escape')closePopup();
  var km={'a':0,'A':0,'b':1,'B':1,'c':2,'C':2,'d':3,'D':3};
  if(km[e.key]!==undefined&&cur>=14&&cur<=19){var d=cur-14;if(!decDone[d]&&DECS[d].opts[km[e.key]])answerDec(d,DECS[d].opts[km[e.key]]);}
});

buildSlides();
updateHUD();
</script>
</body>
</html>
